          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVERS: ${{ vars.EMAIL_RECEIVERS || secrets.EMAIL_RECEIVERS }}
          EMAIL_SENDER_NAME: ${{ vars.EMAIL_SENDER_NAME || secrets.EMAIL_SENDER_NAME || 'Asistente de Análisis de Acciones' }}
          
          # Método 5: Pushover
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
          PUSHOVER_API_TOKEN: ${{ secrets.PUSHOVER_API_TOKEN }}

          # Extensión método 5: ntfy
          NTFY_URL: ${{ secrets.NTFY_URL }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}

          # Extensión método 5: Gotify
          GOTIFY_URL: ${{ secrets.GOTIFY_URL }}
          GOTIFY_TOKEN: ${{ secrets.GOTIFY_TOKEN }}
          
          # Método 6: PushPlus
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          PUSHPLUS_TOPIC: ${{ vars.PUSHPLUS_TOPIC || secrets.PUSHPLUS_TOPIC }}
          
          # Método 7: Webhook personalizado (DingTalk, Bark, servidor propio, etc.)
          CUSTOM_WEBHOOK_URLS: ${{ secrets.CUSTOM_WEBHOOK_URLS }}
          CUSTOM_WEBHOOK_BEARER_TOKEN: ${{ secrets.CUSTOM_WEBHOOK_BEARER_TOKEN }}
          CUSTOM_WEBHOOK_BODY_TEMPLATE: ${{ vars.CUSTOM_WEBHOOK_BODY_TEMPLATE || secrets.CUSTOM_WEBHOOK_BODY_TEMPLATE }}
          WEBHOOK_VERIFY_SSL: ${{ vars.WEBHOOK_VERIFY_SSL || secrets.WEBHOOK_VERIFY_SSL || 'true' }}
          
          # Método 8: Discord
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_MAIN_CHANNEL_ID: ${{ secrets.DISCORD_MAIN_CHANNEL_ID }}
          
          # Método 9: Documentos en la nube Feishu
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_FOLDER_TOKEN: ${{ secrets.FEISHU_FOLDER_TOKEN }}
          FEISHU_CHAT_ID: ${{ vars.FEISHU_CHAT_ID || secrets.FEISHU_CHAT_ID }}
          FEISHU_RECEIVE_ID_TYPE: ${{ vars.FEISHU_RECEIVE_ID_TYPE || secrets.FEISHU_RECEIVE_ID_TYPE }}
          FEISHU_DOMAIN: ${{ vars.FEISHU_DOMAIN || secrets.FEISHU_DOMAIN }}

          # Método 10: AstrBot
          ASTRBOT_URL: ${{ secrets.ASTRBOT_URL }}
          ASTRBOT_TOKEN: ${{ secrets.ASTRBOT_TOKEN }}

          # Método 11: Server酱3
          SERVERCHAN3_SENDKEY: ${{ secrets.SERVERCHAN3_SENDKEY }}

          # Método 12: Slack
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}

          # Estrategia de enrutamiento de notificaciones (vacío = mantener todos los canales configurados)
          NOTIFICATION_REPORT_CHANNELS: ${{ vars.NOTIFICATION_REPORT_CHANNELS || secrets.NOTIFICATION_REPORT_CHANNELS }}
          NOTIFICATION_ALERT_CHANNELS: ${{ vars.NOTIFICATION_ALERT_CHANNELS || secrets.NOTIFICATION_ALERT_CHANNELS }}
          NOTIFICATION_SYSTEM_ERROR_CHANNELS: ${{ vars.NOTIFICATION_SYSTEM_ERROR_CHANNELS || secrets.NOTIFICATION_SYSTEM_ERROR_CHANNELS }}
          NOTIFICATION_DEDUP_TTL_SECONDS: ${{ vars.NOTIFICATION_DEDUP_TTL_SECONDS || secrets.NOTIFICATION_DEDUP_TTL_SECONDS || '0' }}
          NOTIFICATION_COOLDOWN_SECONDS: ${{ vars.NOTIFICATION_COOLDOWN_SECONDS || secrets.NOTIFICATION_COOLDOWN_SECONDS || '0' }}
          NOTIFICATION_QUIET_HOURS: ${{ vars.NOTIFICATION_QUIET_HOURS || secrets.NOTIFICATION_QUIET_HOURS }}
          NOTIFICATION_TIMEZONE: ${{ vars.NOTIFICATION_TIMEZONE || secrets.NOTIFICATION_TIMEZONE }}
          NOTIFICATION_MIN_SEVERITY: ${{ vars.NOTIFICATION_MIN_SEVERITY || secrets.NOTIFICATION_MIN_SEVERITY }}
          NOTIFICATION_DAILY_DIGEST_ENABLED: ${{ vars.NOTIFICATION_DAILY_DIGEST_ENABLED || secrets.NOTIFICATION_DAILY_DIGEST_ENABLED || 'false' }}

          # ==========================================
          # Configuración de acciones
          # ==========================================
          # Evitar escribir directamente STOCK_LIST, mantener el valor del Environment variable del runner con el mismo nombre.
          STOCK_LIST_CONFIG: ${{ vars.STOCK_LIST || secrets.STOCK_LIST }}
          MARKET_REVIEW_REGION: ${{ vars.MARKET_REVIEW_REGION || secrets.MARKET_REVIEW_REGION || 'cn' }}
          MARKET_REVIEW_COLOR_SCHEME: ${{ vars.MARKET_REVIEW_COLOR_SCHEME || secrets.MARKET_REVIEW_COLOR_SCHEME || 'green_up' }}
          
          # ==========================================
          # Configuración de ejecución
          # ==========================================
          REPORT_TYPE: ${{ vars.REPORT_TYPE || secrets.REPORT_TYPE || 'simple' }}
          REPORT_LANGUAGE: ${{ vars.REPORT_LANGUAGE || secrets.REPORT_LANGUAGE || '' }}
          REPORT_SHOW_LLM_MODEL: ${{ vars.REPORT_SHOW_LLM_MODEL || secrets.REPORT_SHOW_LLM_MODEL || 'true' }}
          SINGLE_STOCK_NOTIFY: ${{ vars.SINGLE_STOCK_NOTIFY || secrets.SINGLE_STOCK_NOTIFY || 'false' }}
          MARKET_REVIEW_ENABLED: ${{ vars.MARKET_REVIEW_ENABLED || secrets.MARKET_REVIEW_ENABLED || 'true' }}
          ANALYSIS_DELAY: ${{ vars.ANALYSIS_DELAY || secrets.ANALYSIS_DELAY || '0' }}
          TRADING_DAY_CHECK_ENABLED: ${{ vars.TRADING_DAY_CHECK_ENABLED || secrets.TRADING_DAY_CHECK_ENABLED || 'true' }}
          
          # ==========================================
          # Configuración del sistema
          # ==========================================
          LOG_LEVEL: INFO
          MAX_WORKERS: ${{ vars.MAX_WORKERS || secrets.MAX_WORKERS || '1' }}
          # Distribución de chips: false por defecto (la interfaz en la nube es inestable); para activar, añadir ENABLE_CHIP_DISTRIBUTION=true en Settings → Variables
          ENABLE_CHIP_DISTRIBUTION: ${{ vars.ENABLE_CHIP_DISTRIBUTION || secrets.ENABLE_CHIP_DISTRIBUTION || 'false' }}
          # Prioridad de fuente de datos en tiempo real (Tencent tiene volume ratio y es estable, recomendado como primero)
          # Valores: tencent, akshare_sina, efinance, akshare_em, tushare
          # Si tienes cuenta Tushare Pro con alta puntuación, puedes poner tushare primero
          REALTIME_SOURCE_PRIORITY: ${{ vars.REALTIME_SOURCE_PRIORITY || 'tencent,akshare_sina,efinance,akshare_em' }}
          
        run: |
          # Parsear configuración de acciones:
          # 1. Repository/Environment secrets o Repository variables (STOCK_LIST_CONFIG)
          # 2. Environment variable del runner con el mismo nombre (STOCK_LIST)
          # 3. Valor mínimo por defecto
          if [ -n "${STOCK_LIST_CONFIG:-}" ]; then
            export STOCK_LIST="$STOCK_LIST_CONFIG"
          elif [ -z "${STOCK_LIST:-}" ]; then
            export STOCK_LIST="600519"
          fi

          # Procesar archivo de configuración YAML de LiteLLM
          if [ -n "$LITELLM_CONFIG_YAML" ] && [ -n "$LITELLM_CONFIG" ]; then
            echo "📝 Usando configuración LITELLM_CONFIG_YAML desde GitHub Actions Secrets/Variables"
            # Asegurar que el directorio existe
            mkdir -p "$(dirname "$LITELLM_CONFIG")"
            # Escribir archivo de configuración (sobrescribir archivo existente)
            echo "$LITELLM_CONFIG_YAML" > "$LITELLM_CONFIG"
            echo "✅ Archivo de configuración LiteLLM escrito: $LITELLM_CONFIG"
          fi

          # Determinar modo de ejecución
          MODE="${{ github.event.inputs.mode || 'full' }}"
          
          echo "=========================================="
          echo "🚀 Sistema Inteligente de Análisis de Acciones A"
          echo "=========================================="
          echo "⏰ Hora: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          echo "🎯 Modo: $MODE"
          echo "📊 Acciones: $STOCK_LIST"
          echo "📝 Tipo de reporte: $REPORT_TYPE"
          echo ""
          echo "=========================================="
          echo "📋 Verificación de configuración"
          echo "=========================================="
          echo "【Configuración IA】"
          if [ -n "$LITELLM_CONFIG" ] || [ -n "$LITELLM_API_KEY" ] || [ -n "$LITELLM_MODEL" ] || [ -n "$ANSPIRE_API_KEYS" ]; then
            echo "  LiteLLM: ✅ Configurado"
          else
            echo "  LiteLLM: ❌ No configurado"
          fi
          echo "  Gemini API Key: $([ -n "$GEMINI_API_KEY" ] && echo '✅ Configurada' || echo '❌ No configurada')"
          echo "  DeepSeek Key:   $([ -n "$DEEPSEEK_API_KEY" ] && echo '✅ Configurada' || echo '⚪ No configurada')"
          echo "  Anspire Key:    $([ -n "$ANSPIRE_API_KEYS" ] && echo '✅ Configurada' || echo '⚪ No configurada')"
          echo "  AIHubMix Key:   $([ -n "$AIHUBMIX_KEY" ] && echo '✅ Configurada' || echo '⚪ No configurada')"
          echo "  OpenAI API Key: $([ -n "$OPENAI_API_KEY" ] && echo '✅ Configurada' || echo '⚪ No configurada')"
          echo "  Anthropic Key:  $([ -n "$ANTHROPIC_API_KEY" ] && echo '✅ Configurada' || echo '⚪ No configurada')"
          echo ""
          echo "【Fuentes de datos】"
          echo "  Tushare Token: $([ -n "$TUSHARE_TOKEN" ] && echo '✅ Configurado' || echo '⚪ No configurado')"
          if [ -n "$LONGBRIDGE_APP_KEY" ] && [ -n "$LONGBRIDGE_APP_SECRET" ] && [ -n "$LONGBRIDGE_ACCESS_TOKEN" ]; then
            echo "  Longbridge: ✅ Configurado (API Key legacy)"
          elif [ -n "$LONGBRIDGE_OAUTH_CLIENT_ID" ] || { [ -n "$LONGBRIDGE_APP_KEY" ] && [ -z "$LONGBRIDGE_ACCESS_TOKEN" ]; }; then
            echo "  Longbridge: $([ -n "$LONGBRIDGE_OAUTH_TOKEN_CACHE_B64" ] && echo '✅ Configurado (OAuth token cache)' || echo '🟡 Cliente OAuth configurado, sin token cache')"
          else
            echo "  Longbridge: ⚪ No configurado (solo YFinance, sin llamadas Longbridge)"
          fi
          echo ""
          echo "【Motores de búsqueda】"
          echo "  Bocha API Keys: $([ -n "$BOCHA_API_KEYS" ] && echo '✅ Configuradas' || echo '⚪ No configuradas')"
          echo "  Tavily API Keys: $([ -n "$TAVILY_API_KEYS" ] && echo '✅ Configuradas' || echo '⚪ No configuradas')"
          echo "  SerpAPI Keys: $([ -n "$SERPAPI_API_KEYS" ] && echo '✅ Configuradas' || echo '⚪ No configuradas')"
          echo "  MiniMax API Keys: $([ -n "$MINIMAX_API_KEYS" ] && echo '✅ Configuradas' || echo '⚪ No configuradas')"
          echo "  Brave API Keys: $([ -n "$BRAVE_API_KEYS" ] && echo '✅ Configuradas' || echo '⚪ No configuradas')"
          echo "  SearXNG Base URLs: $([ -n "$SEARXNG_BASE_URLS" ] && echo '✅ Configuradas' || echo '⚪ No configuradas')"
          case "${SEARXNG_PUBLIC_INSTANCES_ENABLED,,}" in
            0|false|no|off)
              echo "  SearXNG Instancias Públicas: ❌ Deshabilitadas"
              ;;
            "")
              echo "  SearXNG Instancias Públicas: ✅ Habilitadas por defecto"
              ;;
            *)
              echo "  SearXNG Instancias Públicas: ✅ Habilitadas"
              ;;
          esac
          echo ""
          echo "【Canales de notificación】"
          echo "  PushPlus: $([ -n "$PUSHPLUS_TOKEN" ] && echo '✅ Configurado' || echo '⚪ No configurado')"
          echo "  ntfy: $([ -n "$NTFY_URL" ] && echo '✅ Configurado' || echo '⚪ No configurado')"
          echo "  Gotify: $([ -n "$GOTIFY_URL" ] && [ -n "$GOTIFY_TOKEN" ] && echo '✅ Configurado' || echo '⚪ No configurado')"
          echo "  WeChat Empresarial: $([ -n "$WECHAT_WEBHOOK_URL" ] && echo '✅ Configurado' || echo '⚪ No configurado')"
          echo "  Feishu: $( ([ -n "$FEISHU_WEBHOOK_URL" ] || ([ -n "$FEISHU_APP_ID" ] && [ -n "$FEISHU_APP_SECRET" ] && [ -n "$FEISHU_CHAT_ID" ]) ) && echo '✅ Configurado' || echo '⚪ No configurado')"
          echo "  Telegram: $([ -n "$TELEGRAM_BOT_TOKEN" ] && echo '✅ Configurado' || echo '⚪ No configurado')"
          echo "  Discord: $([ -n "$DISCORD_WEBHOOK_URL" ] && echo '✅ Configurado' || echo '⚪ No configurado')"
          echo "  AstrBot: $([ -n "$ASTRBOT_URL" ] && echo '✅ Configurado' || echo '⚪ No configurado')"
          echo "  Slack: $(([ -n "$SLACK_WEBHOOK_URL" ] || ([ -n "$SLACK_BOT_TOKEN" ] && [ -n "$SLACK_CHANNEL_ID" ])) && echo '✅ Configurado' || echo '⚪ No configurado')"
          echo "=========================================="
          echo ""
          
          # Construir argumentos de línea de comandos
          FORCE_RUN_ARG=""
          if [ "${{ github.event.inputs.force_run }}" = "true" ]; then
            FORCE_RUN_ARG="--force-run"
            echo "⚡ Modo forzado activado (saltando verificación de día hábil)"
          fi

          # Ejecutar análisis
          if [ "$MODE" = "market-only" ]; then
            python main.py --market-review $FORCE_RUN_ARG
          elif [ "$MODE" = "stocks-only" ]; then
            python main.py --no-market-review $FORCE_RUN_ARG
          else
            python main.py $FORCE_RUN_ARG
          fi
      
      - name: Subir reportes de análisis
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: analysis-reports-${{ github.run_number }}
          path: |
            reports/
            logs/
          retention-days: 30
      
      - name: Mostrar resultado
        if: always()
        run: |
          echo ""
          echo "=========================================="
          echo "📊 Análisis completado"
          echo "=========================================="
          if [ -d "reports" ] && [ "$(ls -A reports 2>/dev/null)" ]; then
            echo "Reportes generados:"
            ls -la reports/
          else
            echo "⚠️ No se generaron archivos de reporte"
          fi
          echo ""
          if [ -f "logs/stock_analysis_$(date +%Y%m%d).log" ]; then
            echo "📜 Últimas 30 líneas del log:"
            tail -30 logs/stock_analysis_*.log 2>/dev/null || echo "Sin logs"
          fi
